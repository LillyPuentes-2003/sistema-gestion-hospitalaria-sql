databaseChangeLog:
  - changeSet:
      id: 007-create-appointments
      author: Lilly
      changes:
        - createTable:
            tableName: appointments
            columns:
              - column:
                  name: id
                  type: SERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_appointments
              - column:
                  name: patient_id
                  type: INTEGER
                  constraints:
                    nullable: false
                    foreignKeyName: fk_appointments_patient
                    references: patients(id)
              - column:
                  name: doctor_id
                  type: INTEGER
                  constraints:
                    nullable: false
                    foreignKeyName: fk_appointments_doctor
                    references: doctors(id)
              - column:
                  name: appointment_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: appointment_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: reason
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: scheduled
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: appointments