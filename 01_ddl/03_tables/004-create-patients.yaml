databaseChangeLog:
  - changeSet:
      id: 004-create-patients
      author: Lilly
      changes:
        - createTable:
            tableName: patients
            columns:
              - column:
                  name: id
                  type: SERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_patients
              - column:
                  name: health_insurance_company_id
                  type: INTEGER
                  constraints:
                    nullable: false
                    foreignKeyName: fk_patients_health_insurance
                    references: health_insurance_companies(id)
              - column:
                  name: first_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: identification_number
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_patients_identification
              - column:
                  name: date_of_birth
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: gender
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: blood_type
                  type: VARCHAR(5)
              - column:
                  name: phone
                  type: VARCHAR(20)
              - column:
                  name: email
                  type: VARCHAR(100)
              - column:
                  name: address
                  type: TEXT
              - column:
                  name: emergency_contact_name
                  type: VARCHAR(200)
              - column:
                  name: emergency_contact_phone
                  type: VARCHAR(20)
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: patients