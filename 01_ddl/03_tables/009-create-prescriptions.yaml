databaseChangeLog:
  - changeSet:
      id: 009-create-prescriptions
      author: Lilly
      changes:
        - createTable:
            tableName: prescriptions
            columns:
              - column:
                  name: id
                  type: SERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_prescriptions
              - column:
                  name: consultation_id
                  type: INTEGER
                  constraints:
                    nullable: false
                    foreignKeyName: fk_prescriptions_consultation
                    references: consultations(id)
              - column:
                  name: medication_id
                  type: INTEGER
                  constraints:
                    nullable: false
                    foreignKeyName: fk_prescriptions_medication
                    references: medications(id)
              - column:
                  name: dosage
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: frequency
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: duration_days
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: instructions
                  type: TEXT
              - column:
                  name: is_dispensed
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: dispensed_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: prescriptions